stages:
  render_task_config:
    cmd: python -m pipeline.utils.render_task_config
    deps:
      - pipeline/utils/render_task_config.py
      - pipeline/core/config.py
      - pipeline/core/io.py
      - pipeline/configs/task.yaml
    outs:
      - pipeline/configs/generated/task.generated.yaml:
          cache: false
      - edge/runtime/class_names.yaml:
          cache: false
      - edge/runtime/edge.env:
          cache: false

  preprocess:
    cmd: python -m pipeline.stages.preprocess
    deps:
      - pipeline/stages/preprocess.py
      - pipeline/tasks/detection/preprocess.py
      - pipeline/tasks/classification/preprocess.py
      - pipeline/core/config.py
      - pipeline/core/io.py
      - pipeline/configs/generated/task.generated.yaml

  train:
    cmd: python -m pipeline.stages.train
    deps:
      - pipeline/stages/train.py
      - pipeline/tasks/detection/train.py
      - pipeline/tasks/classification/train.py
      - pipeline/core/config.py
      - pipeline/core/io.py
      - pipeline/configs/generated/task.generated.yaml

  evaluate:
    cmd: python -m pipeline.stages.evaluate
    deps:
      - pipeline/stages/evaluate.py
      - pipeline/tasks/detection/evaluate.py
      - pipeline/tasks/classification/evaluate.py
      - pipeline/core/config.py
      - pipeline/core/io.py
      - pipeline/configs/generated/task.generated.yaml

  export_onnx:
    cmd: python -m pipeline.stages.export_onnx
    deps:
      - pipeline/stages/export_onnx.py
      - pipeline/tasks/detection/export_onnx.py
      - pipeline/tasks/classification/export_onnx.py
      - pipeline/core/config.py
      - pipeline/core/io.py
      - pipeline/configs/generated/task.generated.yaml

  convert_rknn:
    cmd: python -m pipeline.stages.convert_rknn
    deps:
      - pipeline/stages/convert_rknn.py
      - pipeline/tasks/detection/convert_rknn.py
      - pipeline/tasks/classification/convert_rknn.py
      - pipeline/core/config.py
      - pipeline/core/io.py
      - pipeline/configs/generated/task.generated.yaml

  register_model:
    cmd: python -m pipeline.stages.register_model
    deps:
      - pipeline/stages/register_model.py
      - pipeline/tasks/detection/register_model.py
      - pipeline/tasks/classification/register_model.py
      - pipeline/core/config.py
      - pipeline/core/io.py
      - pipeline/configs/generated/task.generated.yaml
