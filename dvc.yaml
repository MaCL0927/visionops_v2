stages:
  # ─────────────────────────────────
  # Stage 1: 数据预处理
  # ─────────────────────────────────
  preprocess:
    cmd: python pipeline/stages/preprocess.py
    deps:
      - pipeline/stages/preprocess.py
      - pipeline/configs/data.yaml
      - data/raw/                         # DVC追踪的原始数据目录
    params:
      - pipeline/configs/data.yaml:
          - preprocess.img_size
          - preprocess.augment
          - preprocess.val_split
    outs:
      - data/processed/train/
      - data/processed/val/
      - data/processed/dataset_stats.json

  # ─────────────────────────────────
  # Stage 2: 模型训练
  # ─────────────────────────────────
  train:
    cmd: python pipeline/stages/train.py
    deps:
      - pipeline/stages/train.py
      - pipeline/configs/train.yaml
      - server/training/
      - data/processed/train/
      - data/processed/val/
    params:
      - pipeline/configs/train.yaml:
          - model.architecture
          - model.num_classes
          - train.epochs
          - train.batch_size
          - train.lr
          - train.optimizer
    outs:
      - models/checkpoints/best.pt
      - models/checkpoints/last.pt
    metrics:
      - models/metrics/train_metrics.json:
          cache: false

  # ─────────────────────────────────
  # Stage 3: 模型评估
  # ─────────────────────────────────
  evaluate:
    cmd: python pipeline/stages/evaluate.py
    deps:
      - pipeline/stages/evaluate.py
      - models/checkpoints/best.pt
      - data/processed/val/
    outs:
      - models/metrics/eval_report.json
      - models/metrics/confusion_matrix.png
    metrics:
      - models/metrics/eval_metrics.json:
          cache: false

  # ─────────────────────────────────
  # Stage 4: ONNX导出
  # ─────────────────────────────────
  export_onnx:
    cmd: python pipeline/stages/export_onnx.py
    deps:
      - pipeline/stages/export_onnx.py
      - models/checkpoints/best.pt
      - pipeline/configs/export.yaml
    params:
      - pipeline/configs/export.yaml:
          - onnx.opset_version
          - onnx.dynamic_axes
          - onnx.input_size
    outs:
      - models/export/model.onnx

  # ─────────────────────────────────
  # Stage 5: RKNN模型转换（RK3588）
  # ─────────────────────────────────
  convert_rknn:
    cmd: python pipeline/stages/convert_rknn.py
    deps:
      - pipeline/stages/convert_rknn.py
      - models/export/model.onnx
      - pipeline/configs/rknn.yaml
      - data/processed/val/              # 量化校准数据集
    params:
      - pipeline/configs/rknn.yaml:
          - target_platform
          - quantization.do_quantization
          - quantization.dataset
          - quantization.pre_compile
    outs:
      - models/export/model.rknn
      - models/export/rknn_perf_report.json

  # ─────────────────────────────────
  # Stage 6: 注册到MLflow Model Registry
  # ─────────────────────────────────
  register_model:
    cmd: python pipeline/stages/register_model.py
    deps:
      - pipeline/stages/register_model.py
      - models/export/model.rknn
      - models/metrics/eval_metrics.json
    params:
      - pipeline/configs/mlops.yaml:
          - registry.model_name
          - registry.promotion_threshold.accuracy
          - registry.promotion_threshold.latency_ms
    metrics:
      - models/metrics/registry_result.json:
          cache: false

  # ─────────────────────────────────
  # Detection Stage 0: 生成派生文件
  # ─────────────────────────────────

  render_task_config:
    cmd: python pipeline/utils/render_task_config.py
    deps:
      - pipeline/utils/render_task_config.py
      - pipeline/configs/task.yaml
      - data/raw_detection/data.yaml
    outs:
      - pipeline/configs/detection_data.generated.yaml
      - pipeline/configs/detection_train.generated.yaml
      - pipeline/configs/detection_export.generated.yaml
      - pipeline/configs/detection_rknn.generated.yaml
      - edge/runtime/class_names.yaml
      - edge/runtime/edge.env

  # ─────────────────────────────────
  # Detection Stage 1: 数据预处理
  # ─────────────────────────────────
  preprocess_detection:
    cmd: python pipeline/stages/preprocess_detection.py
    deps:
      - pipeline/stages/preprocess_detection.py
      - pipeline/configs/detection_data.generated.yaml
      - data/raw_detection/
    outs:
      - data/processed_detection/images/train/
      - data/processed_detection/images/val/
      - data/processed_detection/labels/train/
      - data/processed_detection/labels/val/
      - data/processed_detection/data.yaml
      - data/processed_detection/dataset_stats.json

  # ─────────────────────────────────
  # Detection Stage 2: 模型训练
  # ─────────────────────────────────
  train_detection:
    cmd: python pipeline/stages/train_detection.py
    deps:
      - pipeline/stages/train_detection.py
      - pipeline/configs/detection_train.generated.yaml
      - data/processed_detection/data.yaml
      - data/processed_detection/images/train/
      - data/processed_detection/labels/train/
      - data/processed_detection/images/val/
      - data/processed_detection/labels/val/
    outs:
      - models/checkpoints_detection/best.pt
      - models/checkpoints_detection/last.pt
    metrics:
      - models/metrics_detection/train_metrics.json:
          cache: false

  # ─────────────────────────────────
  # Detection Stage 3: 模型评估
  # ─────────────────────────────────
  evaluate_detection:
    cmd: python pipeline/stages/evaluate_detection.py
    deps:
      - pipeline/stages/evaluate_detection.py
      - pipeline/configs/detection_train.generated.yaml
      - models/checkpoints_detection/best.pt
      - data/processed_detection/data.yaml
      - data/processed_detection/images/val/
      - data/processed_detection/labels/val/
    outs:
      - models/metrics_detection/eval_report.json
    metrics:
      - models/metrics_detection/eval_metrics.json:
          cache: false

  # ─────────────────────────────────
  # Detection Stage 4: ONNX导出
  # ─────────────────────────────────
  export_onnx_detection:
    cmd: python pipeline/stages/export_onnx_detection.py
    deps:
      - pipeline/stages/export_onnx_detection.py
      - pipeline/configs/detection_export.generated.yaml
      - models/checkpoints_detection/best.pt
    outs:
      - models/export_detection/model.onnx
      - models/export_detection/export_result.json:
          cache: false

  # ─────────────────────────────────
  # Detection Stage 5: RKNN模型转换（RK3588）
  # ─────────────────────────────────
  convert_rknn_detection:
    cmd: python pipeline/stages/convert_rknn_detection.py
    deps:
      - pipeline/stages/convert_rknn_detection.py
      - pipeline/configs/detection_rknn.generated.yaml
      - models/export_detection/model.onnx
      - data/processed_detection/images/val/
    outs:
      - models/export_detection/model.rknn
      - models/export_detection/rknn_report.json:
          cache: false

  # ─────────────────────────────────
  # Detection Stage 6: 注册到MLflow Model Registry
  # ─────────────────────────────────
  register_model_detection:
    cmd: python pipeline/stages/register_model_detection.py
    deps:
      - pipeline/stages/register_model_detection.py
      - pipeline/configs/detection_mlops.yaml
      - models/export_detection/model.rknn
      - models/metrics_detection/eval_metrics.json
      - models/metrics_detection/mlflow_run_id.txt
    params:
      - pipeline/configs/detection_mlops.yaml:
          - registry.model_name
          - registry.task
          - registry.promotion_threshold.map50
          - registry.promotion_threshold.map50_95
          - registry.promotion_threshold.latency_ms
          - registry.tags.platform
          - registry.tags.quantized
          - registry.tags.auto_registered
          - registry.tags.task
          - registry.tags.model_family
          - paths.eval_metrics
          - paths.train_metrics
          - paths.mlflow_run_id
          - paths.onnx_model
          - paths.rknn_model
          - paths.registry_result
    metrics:
      - models/metrics_detection/registry_result.json:
          cache: false