# 分类 MLOps 管理配置
registry:
  model_name: visionops-classifier

promotion_threshold:
  accuracy: 0.85
  latency_ms: 50
  confidence: 0.70

edge_devices:
  - id: rk3588-001
    host: 192.168.1.200
    port: 22
    user: ubuntu
    deploy_path: /opt/visionops/models/
    service_name: visionops-inference
    health_url: http://localhost:8080/health
    reload_url: http://localhost:8080/reload

retraining:
  enabled: true
  triggers:
    accuracy_drop: 0.05
    data_drift_threshold: 0.1
    new_data_size: 500
  schedule: "0 2 * * 1"

alerts:
  slack_webhook: ""
  email: ""
  metrics_window: 1h