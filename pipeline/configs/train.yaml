# 分类模型训练配置
model:
  architecture: mobilenetv3
  num_classes: 2
  pretrained: true
  pretrained_weights: null

train:
  epochs: 100
  batch_size: 16
  img_size: [224, 224]
  lr: 0.001
  optimizer: AdamW
  lr_scheduler: cosine
  warmup_epochs: 3
  weight_decay: 0.0005

early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.001

amp: true
device: cuda

mlflow:
  experiment_name: visionops-classification
  tracking_uri: http://localhost:5000
  log_artifacts: true
  log_model: true
  tags:
    project: visionops
    platform: rk3588
    task: classification

output:
  checkpoint_dir: models/checkpoints/
  metrics_dir: models/metrics/
  save_period: 5