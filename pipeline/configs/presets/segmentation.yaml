task:
  name: segmentation
  type: segmentation

dataset:
  raw_root: data/raw_segmentation
  raw_yaml: data/raw_segmentation/data.yaml
  processed_root: data/processed_segmentation
  processed_yaml: data/processed_segmentation/data.yaml

classes:
  names:
    - person
    - bicycle
    - car
    - motorcycle
    - airplane
    - bus
    - train
    - truck
    - boat
    - traffic light
    - fire hydrant
    - stop sign
    - parking meter
    - bench
    - bird
    - cat
    - dog
    - horse
    - sheep
    - cow
    - elephant
    - bear
    - zebra
    - giraffe
    - backpack
    - umbrella
    - handbag
    - tie
    - suitcase
    - frisbee
    - skis
    - snowboard
    - sports ball
    - kite
    - baseball bat
    - baseball glove
    - skateboard
    - surfboard
    - tennis racket
    - bottle
    - wine glass
    - cup
    - fork
    - knife
    - spoon
    - bowl
    - banana
    - apple
    - sandwich
    - orange
    - broccoli
    - carrot
    - hot dog
    - pizza
    - donut
    - cake
    - chair
    - couch
    - potted plant
    - bed
    - dining table
    - toilet
    - tv
    - laptop
    - mouse
    - remote
    - keyboard
    - cell phone
    - microwave
    - oven
    - toaster
    - sink
    - refrigerator
    - book
    - clock
    - vase
    - scissors
    - teddy bear
    - hair drier
    - toothbrush
  num_classes: 80

model:
  architecture: yolov8n-seg
  pretrained_weights: models/pretrained/yolov8n-seg.pt
  input_size:
    - 640
    - 640

train:
  epochs: 3
  batch_size: 2
  lr0: 0.001
  device: cuda
  workers: 2
  project: models/runs/segment
  name: visionops_segmentation_test
  exist_ok: true

export:
  mode: rockchip
  checkpoint_path: models/checkpoints_segmentation/best.pt
  output_path: models/export_segmentation/model.onnx
  imgsz: 640
  opset: 12
  simplify: true
  dynamic: false

rknn:
  python_exec: /home/pc/anaconda3/envs/rknn311/bin/python
  target_platform: rk3588
  onnx_model: models/export_segmentation/model.onnx
  rknn_model: models/export_segmentation/model.rknn
  perf_report: models/export_segmentation/rknn_report.json
  build:
    do_quantization: true
    optimization_level: 3
  quantization:
    dataset: data/processed_segmentation/images/val
    dataset_size: 4
    quantized_dtype: asymmetric_quantized-8
  input:
    mean_values:
      - [0, 0, 0]
    std_values:
      - [255, 255, 255]

mlflow:
  experiment_name: visionops-segmentation
  registered_model_name: visionops-segmentation-rk3588
  tracking_uri: http://localhost:5000
  promotion_threshold:
    map50: 0.0
    map50_95: 0.0
    latency_ms: 9999.0

edge:
  port: 8082
  metrics_port: 9091
  npu_core: auto
  conf_threshold: 0.25
  nms_threshold: 0.45
  warmup_runs: 3