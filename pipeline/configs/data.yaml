# 数据预处理配置
preprocess:
  img_size: [640, 640]        # 输入分辨率（RK3588 NPU友好尺寸）
  augment: true
  val_split: 0.2
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  cache_images: true
  num_workers: 4

# 数据集路径
paths:
  raw_data: data/raw/
  processed: data/processed/
  annotations: data/annotations/
