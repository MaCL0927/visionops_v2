task:
  name: detection
  type: yolo_detection

dataset:
  raw_root: data/raw_detection
  raw_yaml: data/raw_detection/data.yaml
  processed_root: data/processed_detection
  processed_yaml: data/processed_detection/data.yaml

classes:
  names:
  - person
  - bicycle
  - car
  - motorcycle
  - airplane
  - bus
  - train
  - truck
  - boat
  - traffic light
  - fire hydrant
  - stop sign
  - parking meter
  - bench
  - bird
  - cat
  - dog
  - horse
  - sheep
  - cow
  - elephant
  - bear
  - zebra
  - giraffe
  - backpack
  - umbrella
  - handbag
  - tie
  - suitcase
  - frisbee
  - skis
  - snowboard
  - sports ball
  - kite
  - baseball bat
  - baseball glove
  - skateboard
  - surfboard
  - tennis racket
  - bottle
  - wine glass
  - cup
  - fork
  - knife
  - spoon
  - bowl
  - banana
  - apple
  - sandwich
  - orange
  - broccoli
  - carrot
  - hot dog
  - pizza
  - donut
  - cake
  - chair
  - couch
  - potted plant
  - bed
  - dining table
  - toilet
  - tv
  - laptop
  - mouse
  - remote
  - keyboard
  - cell phone
  - microwave
  - oven
  - toaster
  - sink
  - refrigerator
  - book
  - clock
  - vase
  - scissors
  - teddy bear
  - hair drier
  - toothbrush
  num_classes: 80

model:
  architecture: yolov8n
  pretrained_weights: models/pretrained/yolov8n.pt
  input_size: 640

train:
  epochs: 20
  batch_size: 16
  lr0: 0.001
  device: 0
  workers: 4
  patience: 20
  cache: false
  project: models/runs/detect
  name: visionops_detection
  exist_ok: true

output:
  checkpoint_dir: models/checkpoints_detection
  metrics_dir: models/metrics_detection
  export_dir: models/export_detection

export:
  checkpoint_path: models/checkpoints_detection/best.pt
  output_path: models/export_detection/model.onnx
  imgsz: 640
  opset: 12
  simplify: true
  dynamic: false
  mode: ultralytics

external_export:
  python_exec: python
  script_path: tools/export_yolov8_rknn_onnx.py

rknn:
  python_exec: /home/pc/anaconda3/envs/rknn311/bin/python
  target_platform: rk3588
  onnx_model: models/export_detection/model.onnx
  rknn_model: models/export_detection/model.rknn
  perf_report: models/export_detection/rknn_report.json

  quantization:
    enable: true
    dataset: data/processed_detection/images/val
    dataset_size: 100
    quantized_dtype: asymmetric_quantized-8

  input:
    mean_values: [[0, 0, 0]]
    std_values: [[255, 255, 255]]
    input_size_list: [[1, 3, 640, 640]]

  build:
    do_quantization: false
    optimization_level: 3

  runtime:
    perf_debug: false
    eval_mem: false

edge:
  host: 0.0.0.0
  port: 8080
  metrics_port: 9091
  npu_core: auto
  conf_threshold: 0.25
  nms_threshold: 0.45
  warmup_runs: 3

runtime:
  generated_dir: edge/runtime
  class_names_file: edge/runtime/class_names.yaml
  edge_env_file: edge/runtime/edge.env