name: VisionOps MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'server/training/**'
      - 'pipeline/**'
      - 'data/**'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: '强制重新训练（忽略缓存）'
        required: false
        default: 'false'
      deploy_after_train:
        description: '训练完成后自动部署'
        required: false
        default: 'true'

env:
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
  MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MINIO_ENDPOINT }}

jobs:
  # ────────────────────────────────
  # Job 1: 数据处理 + 训练 + 转换
  # ────────────────────────────────
  train-and-convert:
    runs-on: ubuntu-latest
    container:
      image: pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime
    
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install dvc[s3]

      - name: 配置DVC远端
        run: |
          dvc remote add -d minio s3://visionops-data --force
          dvc remote modify minio endpointurl ${{ secrets.MINIO_ENDPOINT }}
          dvc remote modify minio access_key_id ${{ secrets.MINIO_ACCESS_KEY }}
          dvc remote modify minio secret_access_key ${{ secrets.MINIO_SECRET_KEY }}

      - name: 拉取数据（DVC）
        run: dvc pull data/ || echo "首次运行，跳过数据拉取"

      - name: 运行MLOps流水线
        run: |
          FLAGS=""
          [ "${{ github.event.inputs.force_retrain }}" = "true" ] && FLAGS="--force"
          # 运行到ONNX导出（RKNN转换需要特殊环境）
          dvc repro preprocess train evaluate export_onnx $FLAGS

      - name: 上传模型artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            models/checkpoints/best.pt
            models/export/model.onnx
            models/metrics/
          retention-days: 30

      - name: 上传DVC缓存
        run: dvc push || echo "DVC推送失败，继续"

  # ────────────────────────────────
  # Job 2: RKNN转换（需要rknn-toolkit2）
  # ────────────────────────────────
  rknn-convert:
    runs-on: ubuntu-latest
    needs: train-and-convert
    
    steps:
      - uses: actions/checkout@v4

      - name: 下载模型artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-models

      - name: 安装rknn-toolkit2
        run: |
          pip install -r requirements.txt
          # rknn-toolkit2 需要从rockchip获取
          # pip install rknn-toolkit2  # 或使用Docker镜像
          echo "注意: 请配置rknn-toolkit2安装"

      - name: 执行RKNN转换
        run: python pipeline/stages/convert_rknn.py

      - name: 注册模型到MLflow
        run: python pipeline/stages/register_model.py

      - name: 上传RKNN模型
        uses: actions/upload-artifact@v4
        with:
          name: rknn-model
          path: models/export/model.rknn
          retention-days: 90

  # ────────────────────────────────
  # Job 3: 部署到边缘设备
  # ────────────────────────────────
  deploy-edge:
    runs-on: ubuntu-latest
    needs: rknn-convert
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.deploy_after_train != 'false')
    environment: production  # 需要审核

    steps:
      - uses: actions/checkout@v4

      - name: 下载RKNN模型
        uses: actions/download-artifact@v4
        with:
          name: rknn-model
          path: models/export/

      - name: 配置SSH密钥
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EDGE_SSH_KEY }}

      - name: 安装部署依赖
        run: pip install pyyaml requests

      - name: 部署到所有边缘设备
        run: |
          chmod +x edge/deploy/push.sh
          bash edge/deploy/push.sh models/export/model.rknn

      - name: 通知部署结果
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "部署状态: $STATUS"
          # 可集成Slack通知
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text": "VisionOps部署'$STATUS'"}'
