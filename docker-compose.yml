version: "3.9"

# VisionOps MLOps基础服务栈
# 包含：MLflow + MinIO(模型/数据存储) + PostgreSQL(元数据) + Grafana+Prometheus(监控)

networks:
  visionops-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  grafana-data:
  prometheus-data:

services:

  # ──────────────────────────────────────────────
  # PostgreSQL — MLflow元数据后端
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: visionops-postgres
    restart: unless-stopped
    networks: [visionops-net]
    environment:
      POSTGRES_USER: visionops
      POSTGRES_PASSWORD: visionops123
      POSTGRES_DB: mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visionops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MinIO — S3兼容对象存储（模型artifact + DVC数据）
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: visionops-minio
    restart: unless-stopped
    networks: [visionops-net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO初始化 — 自动创建bucket
  minio-init:
    image: minio/mc:latest
    container_name: visionops-minio-init
    networks: [visionops-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/visionops-models;
        mc mb --ignore-existing local/visionops-data;
        mc mb --ignore-existing local/mlflow-artifacts;
        echo 'MinIO buckets initialized';
      "

  # ──────────────────────────────────────────────
  # MLflow — 实验追踪 + 模型注册中心
  # ──────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: ./server/mlflow/Dockerfile
    container_name: visionops-mlflow
    restart: unless-stopped
    networks: [visionops-net]
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
    command: >
      mlflow server
        --backend-store-uri postgresql://visionops:visionops123@postgres:5432/mlflow
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000
        --workers 2
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1',5000),5); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # VisionOps API Server — FastAPI后端
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ./server/api/Dockerfile
    container_name: visionops-api
    restart: unless-stopped
    networks: [visionops-net]
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      DATABASE_URL: postgresql://visionops:visionops123@postgres:5432/mlflow
    volumes:
      - ./server:/app/server
      - ./edge:/app/edge
    ports:
      - "8000:8000"

  # ──────────────────────────────────────────────
  # Prometheus — 指标采集
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: visionops-prometheus
    restart: unless-stopped
    networks: [visionops-net]
    volumes:
      - ./pipeline/configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ──────────────────────────────────────────────
  # Grafana — 可视化监控面板
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: visionops-grafana
    restart: unless-stopped
    networks: [visionops-net]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: visionops123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./pipeline/configs/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
